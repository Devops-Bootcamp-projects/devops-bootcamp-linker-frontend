name: Frontend DevSecOps Pipeline

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
  IMAGE_NAME: devopsbootcamp-frontend
  SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}

jobs:

# -----------------------------------------
# JOB 1: Notify Start
# -----------------------------------------
  notify-start:
    runs-on: ubuntu-latest
    steps:
      - name: Send Slack Notification
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_COLOR: '#3273DC'
          SLACK_MESSAGE: "🚀 Frontend Build Started | Run #${{ github.run_number }} | Commit: ${{ github.sha }}"
          SLACK_TITLE: Pipeline Initialized
          SLACK_WEBHOOK: ${{ env.SLACK_WEBHOOK }}

# -----------------------------------------
# JOB 2: Build, Lint, Scan, Push
# -----------------------------------------
  build-scan-push:
    needs: notify-start
    runs-on: ubuntu-latest

    steps:
# -----------------------------------------
# Checkout Code
# -----------------------------------------
      - name: Checkout Repository
        uses: actions/checkout@v4

# -----------------------------------------
# Setup Node.js (with caching)
# -----------------------------------------
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

# -----------------------------------------
# Install Dependencies
# -----------------------------------------
      - name: Install Dependencies
        run: npm ci

# -----------------------------------------
# Lint (Fixed)
# -----------------------------------------
      - name: Run Linter
        run: npm run lint

# -----------------------------------------
# Build App (Fail Fast)
# -----------------------------------------
      - name: Build Application
        run: npm run build

# -----------------------------------------
# Setup Docker Buildx
# -----------------------------------------
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

# -----------------------------------------
# Login to Docker Hub
# -----------------------------------------
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

# -----------------------------------------
# Generate Version Tags
# -----------------------------------------
      - name: Generate Version Tag
        id: vars
        run: |
          VERSION_MINOR=$((5 + ${{ github.run_number }}))
          echo "tag=1.${VERSION_MINOR}" >> $GITHUB_OUTPUT
          echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

# -----------------------------------------
# Build & Push Docker Image (Single Build)
# -----------------------------------------
      - name: Build and Push Docker Image
        id: docker_build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:${{ steps.vars.outputs.tag }}
            ${{ env.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:${{ steps.vars.outputs.tag }}-${{ steps.vars.outputs.sha_short }}
          build-args: |
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

# -----------------------------------------
# Scan Image (Fail on Vulnerabilities)
# -----------------------------------------
      - name: Scan Image (Trivy)
        uses: aquasecurity/trivy-action@0.20.0
        with:
          image-ref: '${{ env.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:${{ steps.vars.outputs.tag }}'
          format: table
          exit-code: '1'
          severity: CRITICAL,HIGH

# -----------------------------------------
# Upload Scan Report (Optional)
# -----------------------------------------
      - name: Upload Scan Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-trivy-report
          path: trivy-report.txt
          if-no-files-found: ignore

# -----------------------------------------
# Final Slack Notification
# -----------------------------------------
      - name: Send Final Slack Notification
        if: always()
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_COLOR: ${{ job.status == 'success' && 'good' || 'danger' }}
          SLACK_MESSAGE: "Frontend Build Result: ${{ job.status }} | Tag: ${{ steps.vars.outputs.tag }}"
          SLACK_TITLE: Pipeline Complete
          SLACK_WEBHOOK: ${{ env.SLACK_WEBHOOK }}