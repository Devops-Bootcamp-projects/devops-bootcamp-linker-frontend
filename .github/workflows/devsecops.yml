# -------------------------------------------------
# PIPELINE NAME: Frontend DevSecOps Pipeline
# -------------------------------------------------

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
  IMAGE_NAME: devopsbootcamp-frontend
  SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}

jobs:
  notify-start:
    runs-on: ubuntu-latest
    steps:
      - name: Send Slack Notification
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_COLOR: '#3273DC'
          SLACK_MESSAGE: "🚀 Frontend Build Started | Run #${{ github.run_number }} | Commit: ${{ github.sha }}"
          SLACK_TITLE: Pipeline Initialized
          SLACK_WEBHOOK: ${{ env.SLACK_WEBHOOK }}

  build-scan-push:
    needs: notify-start
    runs-on: ubuntu-latest
    # REQUIRED: Permissions for GitHub Security tab integration
    permissions:
      contents: write
      security-events: write
    # BEST PRACTICE: Set default working directory to the root
    defaults:
      run:
        working-directory: ${{ github.workspace }}
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Linter (Quality Gate)
        run: npm run lint

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Generate Automated Version and Tag
        id: vars
        run: |
          VERSION_MINOR=$((5 + ${{ github.run_number }}))
          echo "tag=1.${VERSION_MINOR}" >> $GITHUB_OUTPUT
          echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Build Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          tags: ${{ env.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:test
          build-args: |
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}

      # UPDATED: Changed format to SARIF for GitHub Security Tab
      - name: Scan Image (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ env.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:test'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'

      # NEW: Upload the SARIF report to the Security Tab
      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Push Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:${{ steps.vars.outputs.tag }}
            ${{ env.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:${{ steps.vars.outputs.tag }}-${{ steps.vars.outputs.sha_short }}
          build-args: |
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}

      - name: Send Final Slack Notification
        if: always()
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_COLOR: ${{ job.status == 'success' && 'good' || 'danger' }}
          SLACK_MESSAGE: "Frontend Build Result: ${{ job.status }} | Tag: ${{ steps.vars.outputs.tag }}"
          SLACK_TITLE: Pipeline Complete
          SLACK_WEBHOOK: ${{ env.SLACK_WEBHOOK }}