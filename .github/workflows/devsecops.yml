name: Frontend DevSecOps Pipeline

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write
  packages: write

env:
  DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
  IMAGE_NAME: devopsbootcamp-frontend
  SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}

jobs:

# -----------------------------------------
# JOB 1: Notify Start
# -----------------------------------------
  notify-start:
    runs-on: ubuntu-latest
    steps:
      - name: Send Slack Notification
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_COLOR: '#3273DC'
          SLACK_MESSAGE: "🚀 Frontend Build Started | Run #${{ github.run_number }} | Commit: ${{ github.sha }}"
          SLACK_TITLE: Pipeline Initialized
          SLACK_WEBHOOK: ${{ env.SLACK_WEBHOOK }}

# -----------------------------------------
# JOB 2: Build → Scan → Report → Push
# -----------------------------------------
  build-scan-push:
    needs: notify-start
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:

# -----------------------------------------
# Checkout Code
# -----------------------------------------
      - name: Checkout Repository
        uses: actions/checkout@v4

# -----------------------------------------
# Setup Node.js + pnpm cache
# -----------------------------------------
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

# -----------------------------------------
# Install pnpm
# -----------------------------------------
      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

# -----------------------------------------
# Install Dependencies
# -----------------------------------------
      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

# -----------------------------------------
# Lint
# -----------------------------------------
      - name: Run Linter
        run: pnpm run lint

# -----------------------------------------
# Setup Docker Buildx
# -----------------------------------------
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

# -----------------------------------------
# Login to Docker Hub
# -----------------------------------------
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

# -----------------------------------------
# Generate Version Tags
# -----------------------------------------
      - name: Generate Version Tag
        id: vars
        run: |
          VERSION_MINOR=$((5 + ${{ github.run_number }}))
          echo "tag=1.${VERSION_MINOR}" >> $GITHUB_OUTPUT
          echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

# -----------------------------------------
# Build Docker Image (NO PUSH)
# -----------------------------------------
      - name: Build Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: ${{ env.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:${{ steps.vars.outputs.tag }}
          build-args: |
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

# -----------------------------------------
# Scan Image (Trivy)
# -----------------------------------------
      - name: Scan Image (Trivy)
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v $PWD:/root/.cache/ \
            aquasec/trivy:latest image \
            --format table \
            --output trivy-report.txt \
            --severity CRITICAL,HIGH \
            ${{ env.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:${{ steps.vars.outputs.tag }}

# -----------------------------------------
# Upload Scan Report (Artifact)
# -----------------------------------------
      - name: Upload Trivy Scan Report
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report
          path: trivy-report.txt

# -----------------------------------------
# Send Scan Summary to Slack
# -----------------------------------------
      - name: Send Trivy Summary to Slack
        if: always()
        run: |
          CRITICAL=$(grep -c CRITICAL trivy-report.txt || true)
          HIGH=$(grep -c HIGH trivy-report.txt || true)

          curl -X POST -H 'Content-type: application/json' \
          --data "{
            \"text\": \"🔍 *Security Scan Summary*\nImage: ${{ env.IMAGE_NAME }}:${{ steps.vars.outputs.tag }}\nCRITICAL: $CRITICAL\nHIGH: $HIGH\"
          }" \
          ${{ env.SLACK_WEBHOOK }}

# -----------------------------------------
# Commit Report to Repo
# -----------------------------------------
      - name: Commit Trivy Report to Repo
        if: always()
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

          mkdir -p security-reports
          DATE=$(date +'%Y-%m-%d-%H-%M')
          mv trivy-report.txt security-reports/trivy-$DATE.txt

          git add security-reports/
          git commit -m "chore: add trivy scan report ($DATE)" || echo "No changes to commit"
          git push

# -----------------------------------------
# Push Docker Image (AFTER SCAN)
# -----------------------------------------
      - name: Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:${{ steps.vars.outputs.tag }}
            ${{ env.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:${{ steps.vars.outputs.tag }}-${{ steps.vars.outputs.sha_short }}

# -----------------------------------------
# Final Slack Notification
# -----------------------------------------
      - name: Send Final Slack Notification
        if: always()
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_COLOR: ${{ job.status == 'success' && 'good' || 'danger' }}
          SLACK_MESSAGE: "Frontend Build Result: ${{ job.status }} | Tag: ${{ steps.vars.outputs.tag }}"
          SLACK_TITLE: Pipeline Complete
          SLACK_WEBHOOK: ${{ env.SLACK_WEBHOOK }}